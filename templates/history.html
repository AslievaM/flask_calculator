<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Calculation History</h2>

    {% if entries %}
        <ul>
            {% for entry in entries %}
                <li>{{ entry }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No calculations have been recorded yet.</p>
    {% endif %}

    <form method="POST" action="{{ url_for('clear_history') }}">
        <button type="submit">Clear History</button>
    </form>

    <a href="{{ url_for('index') }}">Back to Calculator</a>
</div>

</body>
</html>
